- name: install and run nginx
  hosts: 172.31.24.221
  become: yes # this is equal to -b in adhoc command( getting root access)
  tasks:
  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: latest
  - name: start nginx
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes
